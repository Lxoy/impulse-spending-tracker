version: '3.8'

services:
  mysql:
    image: mysql:9
    container_name: asp_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: impulse_db
    ports:
      - "3333:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backup.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data: